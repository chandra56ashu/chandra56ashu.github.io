name: Build final unified CV

on:
  push:
    paths:
      - 'assets/cv-build/**'
      - '.github/workflows/build-final-cv.yml'

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct final PDF CV
        run: |
          cat assets/cv-build/part-*.b64 | base64 --decode | gzip --decompress > assets/AshutoshChandra_CV.pdf
          test -s assets/AshutoshChandra_CV.pdf
          file assets/AshutoshChandra_CV.pdf

      - name: Commit final CV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/AshutoshChandra_CV.pdf
          if git diff --cached --quiet; then
            echo "CV is already up to date."
            exit 0
          fi
          git commit -m "Add final unified PDF CV [skip ci]"
          git push
